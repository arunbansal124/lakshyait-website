<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - LakshyaIT Admin</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .messages-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }
        .messages-header {
            margin-bottom: 3rem;
        }
        .messages-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .admin-tabs {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        .admin-tabs button {
            padding: 0.8rem 2rem;
            background: var(--surface);
            color: var(--text-secondary);
            border: 2px solid var(--border);
            border-radius: var(--radius-full);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .admin-tabs button.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }
        .message-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--danger);
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }
        .message-card.replied {
            border-left-color: var(--success);
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }
        .message-header h4 {
            color: var(--text);
            font-size: 1.2rem;
        }
        .message-time {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .message-email {
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .message-body {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }
        .message-actions {
            display: flex;
            gap: 1rem;
        }
        .btn-reply, .btn-delete {
            padding: 0.6rem 1.5rem;
            border-radius: var(--radius-full);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-reply {
            background: var(--primary);
            color: white;
        }
        .btn-delete {
            background: var(--danger);
            color: white;
        }
        .btn-reply:hover, .btn-delete:hover {
            transform: translateY(-2px);
        }
        .compose-box {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 200px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../index.html" class="logo">Lakshya<span>Blog</span></a>
                <nav class="nav">
                    <a href="dashboard.html">← Dashboard</a>
                    <a href="../index.html" target="_blank">View Site</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="messages-container">
        <div class="messages-header">
            <h1>Contact Messages</h1>
            <p style="color:var(--text-muted);font-size:1.1rem;">View and respond to visitor messages</p>
        </div>

        <div class="admin-tabs">
            <button class="active" onclick="showInbox()">
                <i class="fas fa-inbox"></i> Inbox (<span id="inbox-count">0</span>)
            </button>
            <button onclick="showCompose()">
                <i class="fas fa-pen"></i> Compose
            </button>
        </div>

        <div id="inbox-content">
            <div style="text-align:center;padding:3rem;">
                <i class="fas fa-spinner fa-spin" style="font-size:3rem;color:var(--primary);"></i>
                <p style="color:var(--text-muted);margin-top:1rem;">Loading messages...</p>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script src="../contact.js"></script>
    <script>
        // Check if user is logged in
        if (sessionStorage.getItem('blog_admin') !== 'true') {
            window.location.href = 'login.html';
        }

        // Detect browser back button - logout
        window.addEventListener('popstate', function(e) {
            sessionStorage.removeItem('blog_admin');
            localStorage.removeItem('blog_admin_remember');
            window.location.href = 'login.html';
        });

        // Auto-load messages
        document.addEventListener('DOMContentLoaded', async () => {
            await loadSupabase();
            await loadMessages();
            showInbox();
        });
    </script>
</body>
</html>
