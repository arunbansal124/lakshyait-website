<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LakshyaIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image: radial-gradient(circle at 20% 50%, rgba(37,99,235,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(8,145,178,0.06) 0%, transparent 50%);
        }

        .login-container {
            background: #ffffff;
            border: 1px solid #e7e5e4;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-family: 'Fraunces', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #1c1917;
            margin-bottom: 0.3rem;
        }

        .logo h1 span { color: #2563eb; }

        .logo p {
            color: #78716c;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider {
            height: 1px;
            background: #e7e5e4;
            margin: 1.5rem 0;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            font-family: 'Fraunces', serif;
            color: #1c1917;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .login-header p { color: #78716c; font-size: 0.9rem; }

        .form-group { margin-bottom: 1.2rem; }

        .form-group label {
            display: block;
            color: #44403c;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .input-wrapper { position: relative; }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #a8a29e;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: #fafaf9;
            border: 1.5px solid #e7e5e4;
            border-radius: 10px;
            color: #1c1917;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .form-group input::placeholder { color: #a8a29e; }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #78716c;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #2563eb; }

        .forgot-password {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover { text-decoration: underline; }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 1.2rem;
        }

        .login-btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37,99,235,0.3);
        }

        .login-btn:active { transform: translateY(0); }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.2rem;
            display: none;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .back-home {
            text-align: center;
            padding-top: 1.2rem;
            border-top: 1px solid #e7e5e4;
        }

        .back-home a {
            color: #78716c;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .back-home a:hover { color: #2563eb; }
        .back-home i { margin-right: 0.4rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Lakshya<span>Blog</span></h1>
            <p>Admin Portal</p>
        </div>

        <div class="divider"></div>

        <div class="login-header">
            <h2>Welcome back</h2>
            <p>Sign in to access the admin panel</p>
        </div>

        <div id="error-message" class="error-message">
            <i class="fas fa-exclamation-circle"></i> Invalid credentials. Please try again.
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
            </div>

            <div class="remember-forgot">
                <label class="remember-me">
                    <input type="checkbox" id="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="back-home">
            <a href="../index.html">
                <i class="fas fa-arrow-left"></i> Back to Website
            </a>
        </div>
    </div>

    <script>
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'lakshya@1204';

        const form = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                sessionStorage.setItem('blog_admin', 'true');
                if (remember) localStorage.setItem('blog_admin_remember', 'true');
                window.location.replace('dashboard.html');
            } else {
                errorMessage.classList.add('show');
                setTimeout(() => errorMessage.classList.remove('show'), 3000);
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('blog_admin_remember') === 'true') {
                sessionStorage.setItem('blog_admin', 'true');
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
