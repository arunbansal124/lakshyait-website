<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - LakshyaIT</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .dashboard-container { max-width: 1100px; margin: 0 auto; padding: 7rem 2rem 4rem; }

        .dashboard-header { margin-bottom: 2.5rem; }
        .dashboard-header h1 { font-family: 'Fraunces', serif; font-size: 2rem; color: var(--text); margin-bottom: 0.3rem; }
        .dashboard-header p { color: var(--text-muted); }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }

        .dashboard-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-shadow: var(--shadow-sm);
        }

        .dashboard-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .card-icon {
            width: 64px; height: 64px;
            margin: 0 auto 1.2rem;
            background: var(--primary-soft);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: var(--primary);
            transition: var(--transition);
        }

        .dashboard-card:hover .card-icon {
            background: var(--primary);
            color: white;
        }

        .dashboard-card h3 { font-family: 'Fraunces', serif; font-size: 1.2rem; color: var(--text); margin-bottom: 0.4rem; }
        .dashboard-card p { color: var(--text-muted); font-size: 0.9rem; }

        .stats-box {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .stats-box h3 { font-family: 'Fraunces', serif; color: var(--text); margin-bottom: 1.5rem; font-size: 1.1rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; text-align: center; }

        .stat-value {
            font-family: 'Fraunces', serif;
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            line-height: 1;
        }

        .stat-label { color: var(--text-muted); font-size: 0.875rem; font-weight: 500; }

        .logout-btn {
            position: fixed;
            top: 80px; right: 2rem;
            padding: 0.6rem 1.4rem;
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .logout-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }

        @media (max-width: 600px) {
            .logout-btn { top: auto; bottom: 1.5rem; right: 1.5rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../index.html" class="logo">Lakshya<span>Blog</span></a>
                <nav class="nav">
                    <a href="dashboard.html" class="active">Dashboard</a>
                    <a href="../index.html" target="_blank">View Site</a>
                </nav>
            </div>
        </div>
    </header>

    <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Admin Dashboard</h1>
            <p>Manage your blog, content, and messages</p>
        </div>

        <div class="cards-grid">
            <a href="posts.html" class="dashboard-card">
                <div class="card-icon"><i class="fas fa-newspaper"></i></div>
                <h3>Manage Posts</h3>
                <p>Create, edit, and delete blog posts</p>
            </a>
            <a href="editor.html" class="dashboard-card">
                <div class="card-icon" style="background:#fff7ed;color:#ea580c;"><i class="fas fa-edit"></i></div>
                <h3>Edit Pages</h3>
                <p>Edit text and content on any page</p>
            </a>
            <a href="messages.html" class="dashboard-card">
                <div class="card-icon" style="background:#f0fdf4;color:#059669;"><i class="fas fa-envelope"></i></div>
                <h3>Messages</h3>
                <p>View and respond to contact messages</p>
            </a>
        </div>

        <div class="stats-box">
            <h3>Quick Stats</h3>
            <div class="stats-grid">
                <div>
                    <div class="stat-value" id="stat-posts" style="color: var(--primary);">…</div>
                    <div class="stat-label">Total Posts</div>
                </div>
                <div>
                    <div class="stat-value" id="stat-messages" style="color: #059669;">…</div>
                    <div class="stat-label">Messages</div>
                </div>
                <div>
                    <div class="stat-value" id="stat-edits" style="color: #ea580c;">…</div>
                    <div class="stat-label">Page Edits</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem('blog_admin') !== 'true') {
            window.location.href = 'login.html';
        }

        window.addEventListener('popstate', function() {
            sessionStorage.removeItem('blog_admin');
            localStorage.removeItem('blog_admin_remember');
            window.location.href = 'login.html';
        });

        function logout() {
            sessionStorage.removeItem('blog_admin');
            localStorage.removeItem('blog_admin_remember');
            window.location.href = 'login.html';
        }

        const SUPABASE_URL = 'https://rbmrbiubrprutrvwfqea.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJibXJiaXVicnBydXRydndmcWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MzExNzIsImV4cCI6MjA4MTIwNzE3Mn0.rd8BQRlxySgAYuhGRusv4cGkYAzMz1ESThpCxaH0DQ4';

        async function loadStats() {
            const editKeys = ['page_edits_home', 'page_edits_about', 'page_edits_contact'];
            document.getElementById('stat-edits').textContent = editKeys.filter(k => localStorage.getItem(k)).length;

            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js';
            s.onload = async () => {
                const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const { count: pc } = await db.from('blog_posts').select('*', { count: 'exact', head: true });
                document.getElementById('stat-posts').textContent = pc ?? 0;
                const { count: mc } = await db.from('contact_message').select('*', { count: 'exact', head: true });
                document.getElementById('stat-messages').textContent = mc ?? 0;
            };
            s.onerror = () => {
                document.getElementById('stat-posts').textContent = '—';
                document.getElementById('stat-messages').textContent = '—';
            };
            document.head.appendChild(s);
        }

        loadStats();
    </script>
</body>
</html>
