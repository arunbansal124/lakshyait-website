<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - LakshyaIT</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }
        
        .dashboard-header {
            margin-bottom: 3rem;
        }
        
        .dashboard-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        
        .dashboard-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .dashboard-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        
        .dashboard-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
        }
        
        .card-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
        }
        
        .dashboard-card h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 0.8rem;
        }
        
        .dashboard-card p {
            color: var(--text-muted);
            line-height: 1.6;
        }
        
        .logout-btn {
            position: fixed;
            top: 90px;
            right: 2rem;
            padding: 0.8rem 2rem;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../index.html" class="logo">Lakshya<span>Blog</span></a>
                <nav class="nav">
                    <a href="dashboard.html" class="active">Dashboard</a>
                    <a href="../index.html" target="_blank">View Site</a>
                </nav>
            </div>
        </div>
    </header>
    
    <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>
    
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Admin Dashboard</h1>
            <p>Manage your blog, content, and messages</p>
        </div>
        
        <div class="cards-grid">
            <a href="posts.html" class="dashboard-card">
                <div class="card-icon">
                    <i class="fas fa-blog"></i>
                </div>
                <h3>Manage Posts</h3>
                <p>Create, edit, and delete blog posts</p>
            </a>
            
            <a href="editor.html" class="dashboard-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #f59e0b, #ef4444);">
                    <i class="fas fa-edit"></i>
                </div>
                <h3>Edit Pages</h3>
                <p>Edit text and images on any page</p>
            </a>
            
            <a href="messages.html" class="dashboard-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #10b981, #06b6d4);">
                    <i class="fas fa-envelope"></i>
                </div>
                <h3>Messages</h3>
                <p>View and respond to contact messages</p>
            </a>
        </div>
        
        <div style="background: var(--surface); padding: 2rem; border-radius: var(--radius-xl); border: 1px solid var(--border);">
            <h3 style="color: var(--text); margin-bottom: 1rem; font-family: 'Space Grotesk', sans-serif;">Quick Stats</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; text-align: center;">
                <div>
                    <p id="stat-posts" style="font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;">…</p>
                    <p style="color: var(--text-muted);">Total Posts</p>
                </div>
                <div>
                    <p id="stat-messages" style="font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #10b981, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;">…</p>
                    <p style="color: var(--text-muted);">Messages</p>
                </div>
                <div>
                    <p id="stat-edits" style="font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;">…</p>
                    <p style="color: var(--text-muted);">Page Edits</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        if (sessionStorage.getItem('blog_admin') !== 'true') {
            window.location.href = 'login.html';
        }

        window.addEventListener('popstate', function() {
            sessionStorage.removeItem('blog_admin');
            localStorage.removeItem('blog_admin_remember');
            window.location.href = 'login.html';
        });

        function logout() {
            sessionStorage.removeItem('blog_admin');
            localStorage.removeItem('blog_admin_remember');
            window.location.href = 'login.html';
        }

        // Load real stats from Supabase
        const SUPABASE_URL = 'https://rbmrbiubrprutrvwfqea.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJibXJiaXVicnBydXRydndmcWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MzExNzIsImV4cCI6MjA4MTIwNzE3Mn0.rd8BQRlxySgAYuhGRusv4cGkYAzMz1ESThpCxaH0DQ4';

        async function loadStats() {
            // Page edits count from localStorage (no DB needed)
            const editKeys = ['page_edits_home', 'page_edits_about', 'page_edits_contact'];
            const editCount = editKeys.filter(k => localStorage.getItem(k)).length;
            document.getElementById('stat-edits').textContent = editCount;

            // Load Supabase then fetch counts
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js';
            script.onload = async () => {
                const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                // Posts count
                const { count: postCount, error: postErr } = await db
                    .from('blog_posts')
                    .select('*', { count: 'exact', head: true });
                document.getElementById('stat-posts').textContent = postErr ? '—' : (postCount ?? 0);

                // Messages count
                const { count: msgCount, error: msgErr } = await db
                    .from('contact_message')
                    .select('*', { count: 'exact', head: true });
                document.getElementById('stat-messages').textContent = msgErr ? '—' : (msgCount ?? 0);
            };
            script.onerror = () => {
                document.getElementById('stat-posts').textContent = '—';
                document.getElementById('stat-messages').textContent = '—';
            };
            document.head.appendChild(script);
        }

        loadStats();
    </script>
</body>
</html>
