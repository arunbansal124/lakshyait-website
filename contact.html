<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact LakshyaIT - Get in touch with us.">
    <title>Contact - LakshyaIT Blog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .contact-hero {
            padding: 12rem 0 6rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .contact-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .contact-hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--text) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }
        .contact-hero p {
            font-size: 1.3rem;
            color: var(--text-muted);
        }
        
        /* Contact Form */
        .contact-section {
            max-width: 700px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        .contact-form {
            background: var(--surface);
            padding: 3rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }
        .form-group {
            margin-bottom: 2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 600;
            color: var(--text);
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1.2rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .form-group textarea {
            min-height: 180px;
            resize: vertical;
        }
        .submit-btn {
            width: 100%;
            padding: 1.3rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        /* Admin Inbox Styles */
        .admin-mode .contact-form {
            display: none;
        }
        .admin-tabs {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        .admin-tabs button {
            padding: 0.8rem 2rem;
            background: var(--surface);
            color: var(--text-secondary);
            border: 2px solid var(--border);
            border-radius: var(--radius-full);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .admin-tabs button.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }
        
        .message-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--danger);
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }
        .message-card.replied {
            border-left-color: var(--success);
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }
        .message-header h4 {
            color: var(--text);
            font-size: 1.2rem;
        }
        .message-time {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .message-email {
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .message-body {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }
        .message-actions {
            display: flex;
            gap: 1rem;
        }
        .btn-reply,
        .btn-delete {
            padding: 0.6rem 1.5rem;
            border-radius: var(--radius-full);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-reply {
            background: var(--primary);
            color: white;
        }
        .btn-delete {
            background: var(--danger);
            color: white;
        }
        .btn-reply:hover,
        .btn-delete:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">Lakshya<span>Blog</span></a>
                <nav class="nav">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="contact.html" class="active">Contact</a>
                </nav>
                <button class="mobile-toggle" onclick="toggleMobileMenu()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
    </div>

    <!-- Hero -->
    <section class="contact-hero">
        <div class="container">
            <h1>Get In Touch</h1>
            <p>Have a question or feedback? We'd love to hear from you.</p>
        </div>
    </section>

    <!-- Contact Form / Admin Inbox -->
    <section class="contact-section">
        <!-- Visitor Contact Form -->
        <form class="contact-form" id="contact-form">
            <div class="form-group">
                <label for="name">Your Name *</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="company">Company (Optional)</label>
                <input type="text" id="company" name="company">
            </div>
            
            <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i> Send Message
            </button>
        </form>

        <!-- Admin Inbox (Hidden by default) -->
        <div id="admin-inbox" style="display:none;">
            <div class="admin-tabs">
                <button id="inbox-tab" class="active" onclick="showInbox()">
                    <i class="fas fa-inbox"></i> Inbox (<span id="inbox-count">0</span>)
                </button>
                <button id="compose-tab" onclick="showCompose()">
                    <i class="fas fa-pen"></i> Compose
                </button>
            </div>
            
            <div id="inbox-content"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h3>Lakshya<span>Blog</span></h3>
                    <p>Your source for tech insights and innovation</p>
                </div>
                <div class="footer-links">
                    <h4>Quick Links</h4>
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                    <a href="privacy.html">Privacy Policy</a>
                </div>
                <div class="footer-social">
                    <h4>Follow Us</h4>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-linkedin"></i></a>
                        <a href="#"><i class="fab fa-github"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 LakshyaIT Blog. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="contact.js"></script>
</body>
</html>
